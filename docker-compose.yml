services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: licit-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=LicitDev2024!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - licit-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "LicitDev2024!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth-service:
    build:
      context: .
      dockerfile: src/Services/AuthService/Dockerfile
    container_name: licit-auth-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=LicitAuthDb;User Id=sa;Password=LicitDev2024!;TrustServerCertificate=true;
      - JwtSettings__Secret=DockerOrtamiIcinGizliAnahtarEnAz32KarakterOlmalidir!
      - JwtSettings__Issuer=Licit.AuthService
      - JwtSettings__Audience=Licit.Client
    ports:
      - "5122:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - licit-network

  tendering-service:
    build:
      context: .
      dockerfile: src/Services/TenderingService/Dockerfile
    container_name: licit-tendering-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=LicitTenderingDb;User Id=sa;Password=LicitDev2024!;TrustServerCertificate=true;
      - JwtSettings__Secret=DockerOrtamiIcinGizliAnahtarEnAz32KarakterOlmalidir!
      - JwtSettings__Issuer=Licit.AuthService
      - JwtSettings__Audience=Licit.Client
    ports:
      - "5132:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - licit-network

  wallet-service:
    build:
      context: .
      dockerfile: src/Services/WalletService/Dockerfile
    container_name: licit-wallet-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=LicitWalletDb;User Id=sa;Password=LicitDev2024!;TrustServerCertificate=true;
      - JwtSettings__Secret=DockerOrtamiIcinGizliAnahtarEnAz32KarakterOlmalidir!
      - JwtSettings__Issuer=Licit.AuthService
      - JwtSettings__Audience=Licit.Client
    ports:
      - "5142:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - licit-network

  mail-service:
    build:
      context: .
      dockerfile: src/Services/MailService/Dockerfile
    container_name: licit-mail-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=LicitMailDb;User Id=sa;Password=LicitDev2024!;TrustServerCertificate=true;
      - JwtSettings__Secret=DockerOrtamiIcinGizliAnahtarEnAz32KarakterOlmalidir!
      - JwtSettings__Issuer=Licit.AuthService
      - JwtSettings__Audience=Licit.Client
      - SmtpSettings__Host=sandbox.smtp.mailtrap.io
      - SmtpSettings__Port=587
      - SmtpSettings__Username=${MAILTRAP_USERNAME:-username}
      - SmtpSettings__Password=${MAILTRAP_PASSWORD:-password}
      - SmtpSettings__FromEmail=noreply@licit.com
      - SmtpSettings__FromName=Licit
    ports:
      - "5152:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - licit-network

volumes:
  sqlserver-data:

networks:
  licit-network:
    driver: bridge
