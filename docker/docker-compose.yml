services:
  gateway:
    build:
      context: ..
      dockerfile: src/Gateway/Dockerfile
    container_name: licit-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ReverseProxy__Clusters__auth-cluster__Destinations__auth-service__Address=http://auth-service:8080/
      - ReverseProxy__Clusters__tendering-cluster__Destinations__tendering-service__Address=http://tendering-service:8080/
      - ReverseProxy__Clusters__wallet-cluster__Destinations__wallet-service__Address=http://wallet-service:8080/
      - ReverseProxy__Clusters__mail-cluster__Destinations__mail-service__Address=http://mail-service:8080/
      - ReverseProxy__Clusters__bidding-cluster__Destinations__bidding-service__Address=http://host.docker.internal:5160/
      - ReverseProxy__Clusters__streamer-cluster__Destinations__streamer-service__Address=http://host.docker.internal:5161/
      - ReverseProxy__Clusters__frontend-cluster__Destinations__frontend-dev-server__Address=http://host.docker.internal:5173/
    ports:
      - "5100:8080"
    depends_on:
      auth-service:
        condition: service_started
      tendering-service:
        condition: service_started
      wallet-service:
        condition: service_started
      mail-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - licit-network

  auth-service:
    build:
      context: ..
      dockerfile: src/Services/AuthService/Dockerfile
    container_name: licit-auth-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${AUTH_DB_CONNECTION_STRING}
      - JwtSettings__Secret=DockerOrtamiIcinGizliAnahtarEnAz32KarakterOlmalidir!
      - JwtSettings__Issuer=Licit.AuthService
      - JwtSettings__Audience=Licit.Client
      - Redis__ConnectionString=redis:6379,password=LicitDev2024!
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=licit
      - RabbitMq__Password=LicitDev2024!
    ports:
      - "5122:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - licit-network

  tendering-service:
    build:
      context: ..
      dockerfile: src/Services/TenderingService/Dockerfile
    container_name: licit-tendering-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${TENDERING_DB_CONNECTION_STRING}
      - JwtSettings__Secret=DockerOrtamiIcinGizliAnahtarEnAz32KarakterOlmalidir!
      - JwtSettings__Issuer=Licit.AuthService
      - JwtSettings__Audience=Licit.Client
      - Redis__ConnectionString=redis:6379,password=LicitDev2024!
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=licit
      - RabbitMq__Password=LicitDev2024!
    ports:
      - "5132:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - licit-network

  wallet-service:
    build:
      context: ..
      dockerfile: src/Services/WalletService/Dockerfile
    container_name: licit-wallet-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${WALLET_DB_CONNECTION_STRING}
      - JwtSettings__Secret=DockerOrtamiIcinGizliAnahtarEnAz32KarakterOlmalidir!
      - JwtSettings__Issuer=Licit.AuthService
      - JwtSettings__Audience=Licit.Client
    ports:
      - "5142:8080"
    networks:
      - licit-network

  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: licit-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=licit
      - RABBITMQ_DEFAULT_PASS=LicitDev2024!
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - licit-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8.6-alpine
    container_name: licit-redis
    command: redis-server --requirepass LicitDev2024!
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - licit-network
    healthcheck:
      test: redis-cli -a LicitDev2024! ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mail-service:
    build:
      context: ..
      dockerfile: src/Services/MailService/Dockerfile
    container_name: licit-mail-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${MAIL_DB_CONNECTION_STRING}
      - JwtSettings__Secret=DockerOrtamiIcinGizliAnahtarEnAz32KarakterOlmalidir!
      - JwtSettings__Issuer=Licit.AuthService
      - JwtSettings__Audience=Licit.Client
      - SmtpSettings__Host=sandbox.smtp.mailtrap.io
      - SmtpSettings__Port=587
      - SmtpSettings__Username=${MAILTRAP_USERNAME:-username}
      - SmtpSettings__Password=${MAILTRAP_PASSWORD:-password}
      - SmtpSettings__FromEmail=noreply@licit.com
      - SmtpSettings__FromName=Licit
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=licit
      - RabbitMq__Password=LicitDev2024!
    ports:
      - "5152:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - licit-network

volumes:
  rabbitmq-data:
  redis-data:

networks:
  licit-network:
    driver: bridge
